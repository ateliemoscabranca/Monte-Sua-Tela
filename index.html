<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte sua Tela</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f7f9;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.section{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
  border-radius:16px;
}

h3{margin-bottom:5px;}
.subtitle{font-size:13px;color:#666;margin-bottom:15px;}

.card{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
}

.card.selected{
  border:2px solid #962D53;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card span{
  display:block;
  padding:10px;
  text-align:center;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* TAMANHOS */
.size-card{
  padding:12px;
  border:2px solid #eee;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.size-card.selected{
  border:2px solid #962D53;
  background:#fff5f8;
}

/* UPLOAD */
.upload{
  border:2px dashed #ccc;
  padding:25px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:12px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BOTÃO */
button{
  width:100%;
  padding:16px;
  background:#962D53;
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:16px;
}

.resumo{
  font-size:13px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<!-- FORMATO -->

<div class="section">
<h3>Formato</h3>
<p class="subtitle">Escolha o formato</p>

<div class="grid">
<div class="card" onclick="selectCard(this,'Formato','Horizontal','sec2')">
<img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=800&q=80">
<span>Horizontal</span>
</div>

<div class="card" onclick="selectCard(this,'Formato','Vertical','sec2')">
<img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9?auto=format&fit=crop&w=800&q=80">
<span>Vertical</span>
</div>
</div>
</div>

<!-- TAMANHO -->

<div class="section" id="sec2">
<h3>Tamanho</h3>
<p class="subtitle">Escolha o tamanho</p>

<div class="grid">
<div class="size-card" onclick="selectSize(this,'30x30 - R$59','sec3')">30x30<br><strong>R$59</strong></div>
<div class="size-card" onclick="selectSize(this,'40x60 - R$141','sec3')">40x60<br><strong>R$141</strong></div>
<div class="size-card" onclick="selectSize(this,'60x80 - R$283','sec3')">60x80<br><strong>R$283</strong></div>
<div class="size-card" onclick="selectSize(this,'80x100 - R$472','sec3')">80x100<br><strong>R$472</strong></div>
<div class="size-card" onclick="selectSize(this,'100x100 - R$590','sec3')">100x100<br><strong>R$590</strong></div>
<div class="size-card" onclick="selectSize(this,'100x140 - R$826','sec3')">100x140<br><strong>R$826</strong></div>
</div>
</div>

<!-- UPLOAD -->

<div class="section" id="sec3">
<h3>Envie sua imagem</h3>

<div class="upload" onclick="file.click()">Clique para enviar</div>

<input type="file" id="file" hidden onchange="previewImage(event);scrollToNext('sec4')">
<img id="preview" class="preview" style="display:none">
</div>

<!-- ESTILO -->

<div class="section" id="sec4">
<h3>Estilo</h3>

<div class="grid">
<div class="card" onclick="selectCard(this,'Estilo','Original','sec5')">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<span>Original</span>
</div>

<div class="card" onclick="selectCard(this,'Estilo','Preto e branco','sec5')">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?grayscale">
<span>P&B</span>
</div>
</div>
</div>

<!-- DADOS -->

<div class="section" id="sec5">
<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="tel" placeholder="Telefone">

<div class="resumo" id="resumo"></div>

<button onclick="enviar()">Finalizar Pedido</button>

</div>

</div>

<script>
let dados={};

function selectCard(el,campo,valor,next){
  el.parentNode.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  dados[campo]=valor;
  atualizar();
  scrollToNext(next);
}

function selectSize(el,valor,next){
  document.querySelectorAll('.size-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  dados["Tamanho"]=valor;
  atualizar();
  scrollToNext(next);
}

function scrollToNext(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function previewImage(e){
  let img=document.getElementById("preview");
  img.src=URL.createObjectURL(e.target.files[0]);
  img.style.display="block";
}

function atualizar(){
  document.getElementById("resumo").innerHTML =
  `Formato: ${dados.Formato||'-'}<br>
   Tamanho: ${dados.Tamanho||'-'}<br>
   Estilo: ${dados.Estilo||'-'}`;
}

function enviar(){
  let msg=`Pedido:%0A
Formato:${dados.Formato}
Tamanho:${dados.Tamanho}
Estilo:${dados.Estilo}`;

  window.open(`https://wa.me/5531997969797?text=${msg}`);
}
</script>

</body>
</html>
