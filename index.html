<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte sua Tela</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f7f9;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px;
  background:#fff;
  border-radius:14px;
  margin-bottom:15px;
}

.section{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
  border-radius:20px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  margin-bottom:12px;
  cursor:pointer;
  border:2px solid transparent;
}

.card.selected{
  border:2px solid #962D53;
}

.card img{
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.upload-box{
  border:2px dashed #ccc;
  padding:30px;
  text-align:center;
  border-radius:16px;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

button{
  width:100%;
  padding:16px;
  background:#962D53;
  color:#fff;
  border:none;
  border-radius:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<strong>Monte sua tela</strong>
</div>

<div class="section">
<h3>Formato</h3>

<div class="card" onclick="select(this,'Formato','Horizontal','sec2')">
<img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=800&q=80">
</div>

<div class="card" onclick="select(this,'Formato','Vertical','sec2')">
<img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9?auto=format&fit=crop&w=800&q=80">
</div>
</div>

<div class="section" id="sec2">
<h3>Tamanho</h3>

<div class="card" onclick="select(this,'Tamanho','40x60','sec3')"><span>40x60</span></div>
<div class="card" onclick="select(this,'Tamanho','60x80','sec3')"><span>60x80</span></div>
</div>

<div class="section" id="sec3">
<h3>Envie sua imagem</h3>

<div class="upload-box" onclick="file.click()">
<p>Enviar foto</p>
</div>

<input type="file" id="file" hidden onchange="previewImage(event)">
<img id="preview" class="preview" style="display:none">
</div>

<button onclick="enviar()">Enviar Pedido</button>

</div>

<script>
let dados={};

function select(el,campo,valor,nextId){
  el.parentNode.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  dados[campo]=valor;
  document.getElementById(nextId)?.scrollIntoView({behavior:'smooth'});
}

function previewImage(e){
  let img=document.getElementById("preview");
  img.src=URL.createObjectURL(e.target.files[0]);
  img.style.display="block";
}

function enviar(){
  window.open("https://wa.me/5531997969797");
}
</script>

</body>
</html>
